server:
  port: 8080

spring:
  application:
    name: agentops-server

  # ========== 主库 (诊断记录/Trace) ==========
  datasource:
    primary:
      url: jdbc:postgresql://localhost:5432/agentops
      username: admin
      password: ${DB_PASSWORD:admin123}

    # ========== 只读监控库 (Agent 查询目标) ==========
    monitor:
      url: jdbc:postgresql://localhost:5433/monitor
      username: readonly_user
      password: ${READONLY_PASSWORD:readonly123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}

# ========== LangChain4j ==========
langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY}
    base-url: ${OPENAI_BASE_URL}

# ========== Actuator ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.agentops: DEBUG
    dev.langchain4j: DEBUG
