spring:
  application:
    name: agentops-server-test

  # H2 内存库替代 PostgreSQL（测试环境）
  datasource:
    primary:
      url: jdbc:h2:mem:agentops_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password:
    monitor:
      url: jdbc:h2:mem:monitor_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # 禁用 Redis 自动配置
  data:
    redis:
      host: localhost
      port: 6379

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

langchain4j:
  open-ai:
    api-key: test-key
    base-url: http://localhost:9999

logging:
  level:
    com.agentops: WARN
