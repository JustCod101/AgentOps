version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentops-postgres
    environment:
      POSTGRES_DB: agentops
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentops123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agentops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentops-net

  monitor-db:
    image: postgres:16-alpine
    container_name: agentops-monitor-db
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentops123}
      READONLY_PASSWORD: ${READONLY_PASSWORD:-readonly123}
    volumes:
      - monitor-data:/var/lib/postgresql/data
      - ./sql/monitor-schema.sql:/docker-entrypoint-initdb.d/01-monitor-schema.sql:ro
      - ./sql/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql:ro
      - ./agentops-server/init-monitor-readonly.sh:/docker-entrypoint-initdb.d/03-readonly-user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentops-net

  redis:
    image: redis:7-alpine
    container_name: agentops-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentops-net

  app:
    build:
      context: ./agentops-server
      dockerfile: Dockerfile
    container_name: agentops-server
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/agentops
      DB_PASSWORD: ${DB_PASSWORD:-agentops123}
      MONITOR_DB_URL: jdbc:postgresql://monitor-db:5432/monitor
      READONLY_PASSWORD: ${READONLY_PASSWORD:-readonly123}
      REDIS_HOST: redis
      REDIS_PASSWORD: ""
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      JAVA_OPTS: "-Xms512m -Xmx1024m"
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      monitor-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentops-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentops-frontend
    ports:
      - "3000:80"
    depends_on:
      - app
    networks:
      - agentops-net

volumes:
  postgres-data:
  monitor-data:
  redis-data:

networks:
  agentops-net:
    driver: bridge
